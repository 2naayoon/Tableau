<!DOCTYPE html>
<html>
<head>
    <style>
        * { margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: black; }
        
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        video {
            width: 100%;
            height: 100%;
            /* 영상 비율을 유지하면서 프레임에 꽉 채움 (필요시 약간 잘릴 수 있음) */
            object-fit: cover; 
            display: block;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video autoplay loop muted playsinline webkit-playsinline preload="auto">
            <!-- ./background.mp4 대신 전체 HTTPS 주소를 직접 넣으세요 -->
<source src="https://2naayoon.github.io/Tableau/background.mp4" type="video/mp4">
            <!-- 태블로 엔진이 mp4를 못 읽을 경우를 대비해 추가 -->
            브라우저가 비디오 태그를 지원하지 않습니다.
        </video>
    </div>
</body>
</html>
