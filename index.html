<!DOCTYPE html>
<html>
<head>
    <style>
        * { margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: black; }
        
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        video {
            width: 100%;
            height: 100%;
            /* 영상 비율을 유지하면서 프레임에 꽉 채움 (필요시 약간 잘릴 수 있음) */
            object-fit: cover; 
            display: block;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video autoplay loop muted playsinline>
            <source src="./background.mp4" type="video/mp4">
        </video>
    </div>
</body>
</html>
